syntax = "proto3";

package echo;

option go_package = "github.com/netologist/distributed/communication/grpc-patterns/proto";

// Echo demonstrates unary and streaming RPCs.
service Echo {
  // SayHello is a unary RPC.
  rpc SayHello(HelloRequest) returns (HelloResponse);
  // SayManyHellos is a server-streaming RPC.
  rpc SayManyHellos(HelloRequest) returns (stream HelloResponse);
  // RecordHellos is a client-streaming RPC.
  rpc RecordHellos(stream HelloRequest) returns (HelloResponse);
}

message HelloRequest {
  string name = 1;
}

message HelloResponse {
  string message = 1;
  int64 timestamp = 2;
}
